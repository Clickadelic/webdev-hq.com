name: Deploy webdev-hq.com

on:
  push:
    branches: ["production"]
  workflow_dispatch:

concurrency:
  group: deploy-webdev-hq-production
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  PHP_VERSION: "8.3"

jobs:
  deploy:
    if: ${{ github.ref == 'refs/heads/production' }}
    runs-on: ubuntu-latest
    environment: production

    steps:
      # 1. Code auschecken
      - name: Checkout
        uses: actions/checkout@v4

      # 2. PHP einrichten
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, bcmath, xml, curl, pdo, tokenizer
          coverage: none

      # 3. Composer Cache einrichten
      - name: Cache Composer
        uses: actions/cache@v3
        with:
          path: vendor
          key: composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-

      # 4. Composer-Abhängigkeiten installieren
      - name: Install Composer dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader

      # 5. Node.js einrichten
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      # 6. Node-Dependencies installieren
      - name: Install Node dependencies
        run: npm ci || (rm -f package-lock.json && npm install)

      # 7. Vite Build (inkl. Wayfinder types)
      - name: Build assets with Vite
        env:
          # Verhindert den Datenbank-Fehler während des Bootstrapping
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
          # Ein Fallback-Key, falls Laravel beim Booten einen verlangt
          APP_KEY: base64:u8vS6Yx9f9vH9Z9z9y9x9w9v9u9t9s9r9q9p9o9n9m=
        run: npm run build

      # 8. SSH Key für Deployment schreiben
      - name: Write SSH key (base64 secret)
        shell: bash
        env:
          KEY_B64: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY_B64 }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          KEY="$HOME/.ssh/web_deploy_key"
          if [ -z "$KEY_B64" ]; then
            echo "::error title=Missing secret::DEPLOY_SSH_PRIVATE_KEY_B64 is not set"
            exit 1
          fi
          echo "$KEY_B64" | base64 -d > "$KEY"
          chmod 600 "$KEY"
          ssh-keygen -lf "$KEY" >/dev/null

      # 9. SSH Known Hosts hinzufügen
      - name: Add host key
        shell: bash
        run: |
          set -euo pipefail
          HOST="${{ secrets.DEPLOY_HOST }}"
          PORT="${{ secrets.DEPLOY_PORT }}"; [ -z "$PORT" ] && PORT=22
          ssh-keyscan -p "$PORT" -t rsa,ed25519 -H "$HOST" >> "$HOME/.ssh/known_hosts" 2>/dev/null

      # 10. SSH Connectivity testen
      - name: Probe SSH connectivity
        shell: bash
        run: |
          set -euo pipefail
          PORT="${{ secrets.DEPLOY_PORT }}"; [ -z "$PORT" ] && PORT=22
          ssh -i "$HOME/.ssh/web_deploy_key" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o IdentitiesOnly=yes \
            -p "$PORT" \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" echo ok

      # 11. Remote-Verzeichnis sicherstellen
      - name: Ensure remote directory exists
        shell: bash
        run: |
          set -euo pipefail
          PORT="${{ secrets.DEPLOY_PORT }}"; [ -z "$PORT" ] && PORT=22
          ssh -i "$HOME/.ssh/web_deploy_key" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o IdentitiesOnly=yes \
            -p "$PORT" \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "mkdir -p \"${{ secrets.DEPLOY_PATH }}\""

      # 12. Upload der App (tar stream)
      - name: Upload app (tar stream)
        shell: bash
        run: |
          set -euo pipefail
          PORT="${{ secrets.DEPLOY_PORT }}"; [ -z "$PORT" ] && PORT=22
          REMOTE="${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          REMOTE_PATH="${{ secrets.DEPLOY_PATH }}"
          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=node_modules \
            --exclude=vendor \
            --exclude=tests \
            --exclude=storage \
            --exclude=.env \
            --exclude=x-files \
            -czf - . \
          | ssh -i "$HOME/.ssh/web_deploy_key" \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=yes \
              -o IdentitiesOnly=yes \
              -p "$PORT" \
              "$REMOTE" "tar -xzf - -C \"$REMOTE_PATH\""

      # 13. Remote Deployment: Composer, Artisan, Caches
      - name: Run remote deploy (Composer + Artisan)
        shell: bash
        run: |
          set -euo pipefail
          PORT="${{ secrets.DEPLOY_PORT }}"; [ -z "$PORT" ] && PORT=22
          ssh -i "$HOME/.ssh/web_deploy_key" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o IdentitiesOnly=yes \
            -p "$PORT" \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" << 'EOF'
          set -e
          cd "${{ secrets.DEPLOY_PATH }}"

          # Sicherstellen der Ordner
          mkdir -p storage bootstrap/cache resources/views

          # env-Datei
          [ -f .env ] || cp .env.example .env

          # Alte Caches löschen
          php artisan config:clear
          php artisan view:clear || true

          # Composer + Artisan
          composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader
          php artisan wayfinder:generate
          php artisan key:generate --force || true
          php artisan migrate --force
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache || true
          php artisan storage:link || true

          chmod -R ug+rwx storage bootstrap/cache || true
          EOF
